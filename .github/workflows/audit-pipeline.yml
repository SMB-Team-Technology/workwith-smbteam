name: Audit Pipeline (Pass 1 → Pass 2 → Pass 3)

on:
  push:
    branches: [main]
    paths:
      - 'triggers/audit-research/*.json'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Python deps for PDF generation
        run: pip install reportlab pypdf beautifulsoup4 --break-system-packages --quiet

      - name: Find trigger file and parse inputs
        id: inputs
        run: |
          TRIGGER_FILE=$(git diff-tree --no-commit-id -r --name-only "${{ github.sha }}" \
            | grep '^triggers/audit-research/.*\.json$' | head -1)
          echo "trigger_file=$TRIGGER_FILE" >> "$GITHUB_OUTPUT"
          echo "firm_name=$(jq -r '.firm_name' "$TRIGGER_FILE")"   >> "$GITHUB_OUTPUT"
          echo "friendly_name=$(jq -r '.friendly_name' "$TRIGGER_FILE")" >> "$GITHUB_OUTPUT"
          echo "sales_rep=$(jq -r '.sales_rep' "$TRIGGER_FILE")"   >> "$GITHUB_OUTPUT"
          echo "date=$(jq -r '.date' "$TRIGGER_FILE")"             >> "$GITHUB_OUTPUT"
          echo "hubspot_contact_id=$(jq -r '.hubspot_contact_id // empty' "$TRIGGER_FILE")" >> "$GITHUB_OUTPUT"
          echo "sales_rep_email=$(jq -r '.sales_rep_email // empty' "$TRIGGER_FILE")" >> "$GITHUB_OUTPUT"
          echo "suppress_pricing=$(jq -r '.suppress_pricing // "false"' "$TRIGGER_FILE")" >> "$GITHUB_OUTPUT"
          echo "package=$(jq -r '.package // empty' "$TRIGGER_FILE")" >> "$GITHUB_OUTPUT"
          echo "fathom_url=$(jq -r '.fathom_url // empty' "$TRIGGER_FILE")" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve Fathom URL
        id: resolve_fathom
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          FATHOM_URL=$(node scripts/resolve-fathom-url.mjs \
            "${{ steps.inputs.outputs.hubspot_contact_id }}" \
            "${{ steps.inputs.outputs.fathom_url }}" 2>/dev/null || true)
          echo "fathom_url=${FATHOM_URL}" >> "$GITHUB_OUTPUT"
          if [ -n "$FATHOM_URL" ]; then
            echo "Resolved Fathom URL: $FATHOM_URL"
          else
            echo "No Fathom URL found — Pass 1 will proceed without transcript."
          fi

      - name: Fetch Fathom transcript
        if: steps.resolve_fathom.outputs.fathom_url != ''
        env:
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          TRIGGER_FILE="${{ steps.inputs.outputs.trigger_file }}"
          FATHOM_URL="${{ steps.resolve_fathom.outputs.fathom_url }}"
          CALL_ID=$(echo "$FATHOM_URL" | grep -oP '(?<=/calls/)\d+' || true)

          if [ -n "$CALL_ID" ]; then
            echo "Fetching Fathom summary for call ID: $CALL_ID"
            SUMMARY=$(curl -sf \
              -H "Authorization: Bearer $FATHOM_API_KEY" \
              -H "Accept: application/json" \
              "https://fathom.video/api/v1/calls/${CALL_ID}/summary" \
              | jq -r '.summary // .text // .content // empty')
            if [ -z "$SUMMARY" ]; then
              echo "No summary returned from Fathom for call $CALL_ID — leaving transcript field unchanged."
              exit 0
            fi
            TRUNCATED=$(echo "$SUMMARY" | head -c 8000)
            T="SOURCE: Fathom (direct) — ${FATHOM_URL}"$'\n\n'"${TRUNCATED}"
            jq --arg t "$T" '.transcript = $t' \
              "$TRIGGER_FILE" > /tmp/trigger_updated.json && mv /tmp/trigger_updated.json "$TRIGGER_FILE"
            echo "Transcript injected into $TRIGGER_FILE (${#TRUNCATED} chars)"
          else
            echo "Share URL found ($FATHOM_URL) — extracting transcript from HubSpot internal meeting notes."
            CONTACT_ID="${{ steps.inputs.outputs.hubspot_contact_id }}"
            TRANSCRIPT=$(node scripts/fetch-hubspot-fathom-notes.mjs "$CONTACT_ID" 2>/dev/null || true)
            if [ -z "$TRANSCRIPT" ]; then
              echo "No transcript found in HubSpot internal meeting notes — leaving transcript field unchanged."
              exit 0
            fi
            T="SOURCE: Fathom (via HubSpot internal notes) — ${FATHOM_URL}"$'\n\n'"${TRANSCRIPT}"
            jq --arg t "$T" '.transcript = $t' \
              "$TRIGGER_FILE" > /tmp/trigger_updated.json && mv /tmp/trigger_updated.json "$TRIGGER_FILE"
            echo "Transcript injected from HubSpot internal notes (${#TRANSCRIPT} chars)"
          fi

      - name: Pass 1 — Audit Research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TRIGGER_FILE="${{ steps.inputs.outputs.trigger_file }}"
          claude --model claude-sonnet-5 --dangerously-skip-permissions -p "
            You are running Pass 1 of the SMB Team Growth Audit pipeline.

            Read the trigger file at \`$TRIGGER_FILE\` — it is a JSON file containing
            firm_name, friendly_name, url, sales_rep, date, and transcript.
            Extract those values first.

            The trigger file contains a transcript field with the discovery call notes.
            Use that as ground truth per the TRANSCRIPT-FIRST RULE in the command file.
            If the URL resolves, browse it live. If not (fictional/test firm), fabricate
            realistic research data for all steps. Do not leave any section blank.

            Read \`.claude/commands/audit-research.md\` in full and execute every step in
            order. Save progress after each major section. Commit the research notes file
            to main and report the commit hash when complete.
          "

      - name: Pass 1.5 — Deterministic package selection
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          FRIENDLY_NAME="${{ steps.inputs.outputs.friendly_name }}"
          node scripts/select-package.mjs "$FRIENDLY_NAME" || true

      - name: Pass 2 + 3 — Audit Write (with PPTX)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FIRM_NAME="${{ steps.inputs.outputs.firm_name }}"
          FRIENDLY_NAME="${{ steps.inputs.outputs.friendly_name }}"
          SALES_REP="${{ steps.inputs.outputs.sales_rep }}"
          DATE="${{ steps.inputs.outputs.date }}"
          PACKAGE="${{ steps.inputs.outputs.package }}"

          # Build package instruction — prefer deterministic JSON over soft hint
          PACKAGE_INSTRUCTION=""
          DECISION_FILE="$FRIENDLY_NAME/package_decision.json"
          if [ -f "$DECISION_FILE" ]; then
            CONFIDENCE=$(jq -r '.confidence' "$DECISION_FILE")
            DECISION_JSON=$(cat "$DECISION_FILE")
            if [ "$CONFIDENCE" = "high" ]; then
              PACKAGE_INSTRUCTION=$(printf 'PACKAGE DECISION (revenue confirmed from research notes — do not override):\n%s\nUse EXACTLY these tier names and prices. Do not re-run eligibility logic. Do not recalculate. Copy every dollar amount character-by-character from this JSON.' "$DECISION_JSON")
            else
              PACKAGE_INSTRUCTION=$(printf 'PACKAGE DECISION (revenue was estimated — verify before finalizing):\n%s\nRevenue was NOT explicitly stated in research notes; this is an evidence-based estimate with confidence: %s. Before writing Section 11: re-read the research notes and confirm the revenue band is consistent with all available signals. If the estimate appears correct, use these values exactly. If the research notes clearly indicate a different revenue band, apply the eligibility rules and select the correct tier — document your reasoning in section_11_workings.txt.' "$DECISION_JSON" "$CONFIDENCE")
            fi
          elif [ -n "$PACKAGE" ]; then
            PACKAGE_INSTRUCTION="PACKAGE OVERRIDE: The trigger file specifies \"$PACKAGE\" as the recommended marketing package. You MUST use this package in Section 11 (Next Steps). Do not override with a different tier based on revenue estimates."
          fi

          claude --model claude-sonnet-5 --dangerously-skip-permissions -p "
            You are running Pass 2 of the SMB Team Growth Audit pipeline.

            Firm Name: $FIRM_NAME
            Friendly Name: $FRIENDLY_NAME
            Sales Rep: $SALES_REP
            Date: $DATE
            $PACKAGE_INSTRUCTION

            Read \`.claude/commands/audit-write.md\` in full. Read the research notes file
            and \`Design Files/audit_styles.css\`. Execute every step in order, saving each
            section before moving to the next. Assemble the final HTML report, generate
            the Sales Companion PDF, and commit everything to main. Then run Pass 3 per
            the --with-pptx instructions at the end of audit-write.md. Report the commit
            hash when done.
          "

      - name: Strip pricing sections (consultation meetings only)
        if: steps.inputs.outputs.suppress_pricing == 'true'
        run: |
          FRIENDLY_NAME="${{ steps.inputs.outputs.friendly_name }}"
          echo "suppress_pricing=true — stripping pricing sections from $FRIENDLY_NAME"
          python3 scripts/strip-pricing-sections.py \
            "$FRIENDLY_NAME/index.html" \
            "$FRIENDLY_NAME/sections/section_executive_summary.html" \
            "$FRIENDLY_NAME/sections/section_11_next_steps.html"
          git add "$FRIENDLY_NAME/" || true
          if ! git diff --cached --quiet; then
            git commit -m "Remove pricing sections for consultation meeting audit: $FRIENDLY_NAME"
            git push origin main
          else
            echo "No pricing sections found to remove (may already be clean)."
          fi

      # -----------------------------------------------------------------------
      # STEP 5 — Write back to HubSpot
      # -----------------------------------------------------------------------
      - name: Step 5 — Write audit URL back to HubSpot
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          FRIENDLY_NAME="${{ steps.inputs.outputs.friendly_name }}"
          TRIGGER_FILE="${{ steps.inputs.outputs.trigger_file }}"
          CONTACT_ID=$(jq -r '.hubspot_contact_id // empty' "$TRIGGER_FILE")

          if [ -z "$CONTACT_ID" ]; then
            echo "No hubspot_contact_id in trigger file — skipping HubSpot writeback."
            exit 0
          fi

          WORKWITH_URL="https://workwith.smbteam.com/$FRIENDLY_NAME"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            "https://api.hubapi.com/crm/v3/objects/contacts/$CONTACT_ID" \
            -H "Authorization: Bearer $HUBSPOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"properties\": {\"growth_profit_and_freedom_roadmap\": \"$WORKWITH_URL\"}}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "HubSpot response ($HTTP_CODE): contact $CONTACT_ID → growth_profit_and_freedom_roadmap = $WORKWITH_URL"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: HubSpot returned $HTTP_CODE"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # STEP 6 — Email the closer with PDF + PPTX attachments
      # -----------------------------------------------------------------------
      - name: Step 6 — Email closer with audit attachments
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FIRM_NAME: ${{ steps.inputs.outputs.firm_name }}
          FRIENDLY_NAME: ${{ steps.inputs.outputs.friendly_name }}
          SALES_REP: ${{ steps.inputs.outputs.sales_rep }}
          SALES_REP_EMAIL: ${{ steps.inputs.outputs.sales_rep_email }}
        run: |
          python3 - << 'PYEOF'
          import smtplib, os, glob, sys
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication

          gmail_user       = os.environ["GMAIL_USER"]
          gmail_password   = os.environ["GMAIL_APP_PASSWORD"]
          firm_name        = os.environ["FIRM_NAME"]
          friendly_name    = os.environ["FRIENDLY_NAME"]
          sales_rep        = os.environ["SALES_REP"]
          sales_rep_email  = os.environ.get("SALES_REP_EMAIL", "").strip()

          if not sales_rep_email:
              print("ERROR: sales_rep_email is not set in the trigger file.")
              sys.exit(1)

          # --- Recipients ---
          to_addr  = sales_rep_email
          cc_addrs = [
              "eli.gill@smbteam.com",
              "vanessa.odonnell@smbteam.com",
              "chris.abouraad@smbteam.com",
              "justin.hernandez@smbteam.com",
          ]

          # --- Find attachments ---
          pdf_files   = glob.glob(f"{friendly_name}/*_Sales_Companion.pdf")
          pptx_files  = glob.glob(f"{friendly_name}/*_Proposal.pptx")
          attachments = pdf_files + pptx_files

          if not attachments:
              print(f"WARNING: No PDF or PPTX found in {friendly_name}/. Sending without attachments.")

          # --- Build message ---
          msg = MIMEMultipart()
          msg["From"]    = gmail_user
          msg["To"]      = to_addr
          msg["Cc"]      = ", ".join(cc_addrs)
          msg["Subject"] = f"Growth, Profit, and Freedom Roadmap ready for {firm_name}"

          workwith_url = f"https://workwith.smbteam.com/{friendly_name}"
          body = "\n".join([
              f"Hi {sales_rep},",
              "",
              f"The Growth, Profit, and Freedom Roadmap for {firm_name} is ready ahead of your proposal call.",
              "",
              f"View the full report here: {workwith_url}",
              "",
              "Attached you'll find:",
              "  - Proposal Deck (PowerPoint) — share this on screen during the call",
              "  - Sales Companion (PDF) — your seller-only cheat sheet, not for the client",
              "",
              "Let the team know if you need any changes before the call.",
              "",
              "SMB Team",
              "",
          ])
          msg.attach(MIMEText(body, "plain"))

          for filepath in attachments:
              with open(filepath, "rb") as f:
                  part = MIMEApplication(f.read(), Name=os.path.basename(filepath))
              part["Content-Disposition"] = f'attachment; filename="{os.path.basename(filepath)}"'
              msg.attach(part)
              print(f"Attached: {filepath}")

          # --- Send ---
          all_recipients = [to_addr] + cc_addrs
          with smtplib.SMTP("smtp.gmail.com", 587) as server:
              server.starttls()
              server.login(gmail_user, gmail_password)
              server.sendmail(gmail_user, all_recipients, msg.as_string())

          print(f"Email sent to {to_addr} (CC: {', '.join(cc_addrs)})")
          PYEOF

      # -----------------------------------------------------------------------
      # STEP 7 — Notify Slack that the proposal is ready
      # -----------------------------------------------------------------------
      - name: Step 7 — Notify Slack
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          FIRM_NAME: ${{ steps.inputs.outputs.firm_name }}
          FRIENDLY_NAME: ${{ steps.inputs.outputs.friendly_name }}
          SALES_REP: ${{ steps.inputs.outputs.sales_rep }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request

          token     = os.environ["SLACK_BOT_TOKEN"]
          channel   = os.environ["SLACK_CHANNEL_ID"]
          firm      = os.environ["FIRM_NAME"]
          slug      = os.environ["FRIENDLY_NAME"]
          sales_rep = os.environ["SALES_REP"]
          url       = f"https://workwith.smbteam.com/{slug}"

          text = f"✅ *New proposal ready:* {firm}\n{url}\nPrepared for: {sales_rep}"

          body = json.dumps({"channel": channel, "text": text}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=body,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
          )
          urllib.request.urlopen(req)
          print(f"Slack notification sent for {firm}.")
          PYEOF
