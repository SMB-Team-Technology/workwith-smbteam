name: Slack Change Request Handler

on:
  repository_dispatch:
    types: [slack-change-request]

jobs:
  handle-change:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Handle the request
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          SLACK_INSTRUCTION: ${{ github.event.client_payload.instruction }}
          SLACK_CHANNEL: ${{ github.event.client_payload.slack_channel }}
          SLACK_THREAD_TS: ${{ github.event.client_payload.slack_thread_ts }}
        run: |
          printf '%s' "$SLACK_INSTRUCTION" > /tmp/instruction.txt
          TODAY=$(date -u +%Y-%m-%d)
          printf '%s' "$TODAY" > /tmp/today.txt

          claude --model claude-sonnet-5 --dangerously-skip-permissions -p "
            You are an AI assistant managing law firm growth audit reports for SMB Team.
            Repo is at current working directory. Read /tmp/instruction.txt for the request
            and /tmp/today.txt for today's date.

            Identify which of the four request types applies, then execute it:

            --- TYPE 1: TARGETED EDIT ---
            Triggered by: 'change X in', 'update the package', 'edit the report',
            'fix the pricing', 'remove X from', 'update X to say', etc.
            Steps:
            1. Find the firm folder at repo root (e.g. sivia-law/, oconnor-family-law/).
            2. Make the minimal, precise edit to the HTML file(s).
            3. Commit to main with a clear message.
            4. Write 1-2 sentence summary to /tmp/summary.txt.

            --- TYPE 2: RESEND EMAIL ONLY ---
            Triggered by: 'resend the email', 're-send the email', 'send the email again',
            'email failed', 'email didn't arrive', 'resend email for X'.
            Steps:
            1. Identify the friendly name for the firm (lowercase-hyphenated).
               List triggers/audit-research/ if unsure.
            2. Read the trigger file to get sales_rep and sales_rep_email for the summary.
            3. Dispatch the resend-audit-email workflow via GitHub API:
               curl -s -X POST https://api.github.com/repos/\$GITHUB_REPO/dispatches
                 -H 'Authorization: Bearer '\$GITHUB_PAT
                 -H 'Accept: application/vnd.github.v3+json'
                 -H 'Content-Type: application/json'
                 -d '{\"event_type\":\"resend-audit-email\",\"client_payload\":{\"friendly_name\":\"<name>\",\"slack_channel\":\"\$SLACK_CHANNEL\",\"slack_thread_ts\":\"\$SLACK_THREAD_TS\"}}'
            4. Write to /tmp/summary.txt:
               'Resending email for [Firm] to [sales_rep] ([email]). Should arrive in ~2 min.'

            --- TYPE 3: FULL RE-RUN ---
            Triggered by: 're-run', 'rerun', 'regenerate', 'redo the audit', 'run it again',
            'retrigger', 're-trigger' — any variant implying full report regeneration.
            Steps:
            1. Find triggers/audit-research/[friendly-name].json (list folder if unsure).
            2. Increment _run (set to 2 if missing, else N+1). Update _triggered_date to today.
               Add or update 'package' field if the request specifies one.
            3. CRITICAL: git add ONLY that one trigger file, commit, push.
               One file per commit — the pipeline uses git diff-tree | head -1.
               This fires the full pipeline: regenerates report + PPTX + PDF + re-sends email.
            4. Write to /tmp/summary.txt:
               'Re-triggered full audit for [Firm] (~60-90 min). Email will resend when done.'

            --- TYPE 4: NEW AUDIT FROM SCRATCH ---
            Triggered by: 'trigger new audit', 'run audit for', 'new proposal for', etc.
            Steps:
            1. Parse firm name, contact name, email, website, sales rep, proposal date/time.
            2. If HUBSPOT_TOKEN is set, call HubSpot to fill missing fields:
               Search contacts: POST https://api.hubapi.com/crm/v3/objects/contacts/search
               Get deals: GET .../contacts/{id}/associations/deals
               Get owner: GET .../owners/{ownerId}
               (Authorization: Bearer \$HUBSPOT_TOKEN on all requests)
            3. Build friendly name: lowercase, strip suffixes (llp llc pc pllc ltd law group
               law firm attorneys counselors), replace non-alphanumeric with hyphens, trim.
            4. Write triggers/audit-research/[friendly-name].json with all fields.
            5. CRITICAL: git add ONLY that file, commit, push.
            6. Write summary to /tmp/summary.txt.

            RULES FOR ALL TYPES:
            - Always run 'git pull --rebase origin main' before git push.
            - If push fails with 403/rejected, pull --rebase and retry up to 3 times.
            - For Types 3 and 4: commit ONLY the single trigger file, never multiple files.
            - Sales rep email if unknown: firstname.lastname@smbteam.com.
          "

      - name: Post success to Slack
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ github.event.client_payload.slack_channel }}
          SLACK_THREAD_TS: ${{ github.event.client_payload.slack_thread_ts }}
        run: |
          SUMMARY=$(cat /tmp/summary.txt 2>/dev/null || echo "Done.")
          PAYLOAD=$(jq -n \
            --arg channel  "$SLACK_CHANNEL" \
            --arg thread   "$SLACK_THREAD_TS" \
            --arg text     "✅ $SUMMARY" \
            '{channel: $channel, thread_ts: $thread, text: $text}')
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Post error to Slack
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ github.event.client_payload.slack_channel }}
          SLACK_THREAD_TS: ${{ github.event.client_payload.slack_thread_ts }}
        run: |
          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL" \
            --arg thread  "$SLACK_THREAD_TS" \
            '{channel: $channel, thread_ts: $thread, text: "❌ Something went wrong. Check the GitHub Actions log for details."}')
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
