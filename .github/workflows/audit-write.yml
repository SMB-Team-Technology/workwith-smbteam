name: Audit Write (Pass 2)

on:
  push:
    branches: [main]
    paths:
      - 'triggers/audit-write/*.json'

jobs:
  audit-write:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Identify trigger file
        id: find_trigger
        run: |
          TRIGGER_FILE=$(git diff-tree --no-commit-id -r --name-only ${{ github.sha }} \
            | grep '^triggers/audit-write/.*\.json$' | head -1)
          echo "path=$TRIGGER_FILE" >> $GITHUB_OUTPUT

      - name: Run audit write via Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running Pass 2 of the SMB Team Growth Audit pipeline.

            Read the trigger file at `${{ steps.find_trigger.outputs.path }}` — it is a JSON
            file containing: firm_name, friendly_name, sales_rep, date, and with_pptx (boolean).
            Extract those values first.

            Then read `.claude/commands/audit-write.md` in full. Read the research notes at
            `[friendly-name]/[FirmName]_[Date]_Research_Notes.txt` and
            `Design Files/audit_styles.css`. Execute every step in order, saving each section
            before moving to the next. Assemble the final HTML, generate the Sales Companion PDF,
            and commit everything to main. If with_pptx is true, also run Pass 3 per the
            --with-pptx instructions at the end of audit-write.md. Report the commit hash.
