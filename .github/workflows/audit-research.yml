name: Audit Research (Pass 1)

on:
  push:
    branches: [main]
    paths:
      - 'triggers/audit-research/*.json'

jobs:
  audit-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Identify trigger file
        id: find_trigger
        run: |
          TRIGGER_FILE=$(git diff-tree --no-commit-id -r --name-only ${{ github.sha }} \
            | grep '^triggers/audit-research/.*\.json$' | head -1)
          echo "path=$TRIGGER_FILE" >> $GITHUB_OUTPUT

      - name: Run audit research via Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are running Pass 1 of the SMB Team Growth Audit pipeline.

            Read the trigger file at `${{ steps.find_trigger.outputs.path }}` — it is a JSON
            file containing all inputs for this run: firm_name, friendly_name, url, sales_rep,
            date, and transcript. Extract those values first.

            If the transcript field contains the word "FAKE" or the URL does not resolve,
            this is a test run with a fictional firm. In that case, generate realistic but
            entirely fabricated research data for every step — invent plausible PageSpeed
            scores, review counts, competitor names, ad observations, etc. Do not skip any
            section or leave any field blank.

            Then read `.claude/commands/audit-research.md` in full and execute every step in
            order using the extracted inputs. Save progress after each major section. When
            complete, commit the research notes file to main and report the commit hash.
