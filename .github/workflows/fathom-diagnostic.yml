name: Fathom API Diagnostic

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'triggers/diagnostic-run.txt'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Test Fathom REST API endpoints
        env:
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
        run: |
          echo "=== 1. GET /api/v1/calls (no params) ==="
          curl -s -o /tmp/r1.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $FATHOM_API_KEY" \
            -H "Accept: application/json" \
            "https://fathom.video/api/v1/calls"
          echo "Response keys / structure:"
          jq 'if type == "array" then "TOP-LEVEL ARRAY, length: \(length)" elif type == "object" then "TOP-LEVEL OBJECT, keys: \(keys)" else . end' /tmp/r1.json 2>/dev/null || cat /tmp/r1.json | head -c 500

          echo ""
          echo "=== 2. GET /api/v1/calls?per_page=5 ==="
          curl -s -o /tmp/r2.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $FATHOM_API_KEY" \
            -H "Accept: application/json" \
            "https://fathom.video/api/v1/calls?per_page=5"
          jq 'if type == "array" then "ARRAY, length: \(length), first title: \(.[0].title // .[0].name // "n/a")" elif type == "object" then {keys, count: (.calls // .data // .results // [] | length), first: ((.calls // .data // .results // [])[0] | {id, title, created_at, calendar_invitees})} else . end' /tmp/r2.json 2>/dev/null || cat /tmp/r2.json | head -c 500

          echo ""
          echo "=== 3. GET /api/v1/calls?per_page=5&sort=created_at:desc ==="
          curl -s -o /tmp/r3.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $FATHOM_API_KEY" \
            -H "Accept: application/json" \
            "https://fathom.video/api/v1/calls?per_page=5&sort=created_at:desc"
          jq 'if type == "array" then "ARRAY length \(length)" elif type == "object" then {keys, pagination_keys: (. | keys | map(select(test("next|cursor|page|total|meta")))), count: (.calls // .data // .results // [] | length)} else . end' /tmp/r3.json 2>/dev/null || cat /tmp/r3.json | head -c 500

          echo ""
          echo "=== 4. First call's full field list (what fields exist?) ==="
          jq '(if type == "array" then .[0] elif type == "object" then (.calls // .data // .results // [])[0] else null end) | keys? // "none"' /tmp/r2.json 2>/dev/null

          echo ""
          echo "=== 5. GET /api/v1/calls/704816497 (known call — direct fetch) ==="
          curl -s -o /tmp/r5.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $FATHOM_API_KEY" \
            -H "Accept: application/json" \
            "https://fathom.video/api/v1/calls/704816497"
          jq '{status: "ok", keys: keys, title: .title, id: .id} // "failed"' /tmp/r5.json 2>/dev/null || cat /tmp/r5.json | head -c 300

          echo ""
          echo "=== 6. GET /api/v1/calls/704816497/summary (known call summary) ==="
          curl -s -o /tmp/r6.json -w "HTTP %{http_code}\n" \
            -H "Authorization: Bearer $FATHOM_API_KEY" \
            -H "Accept: application/json" \
            "https://fathom.video/api/v1/calls/704816497/summary"
          jq '{keys: keys, summary_length: (.summary // .text // .content // "" | length)} // "failed"' /tmp/r6.json 2>/dev/null || cat /tmp/r6.json | head -c 300
