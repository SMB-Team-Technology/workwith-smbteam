name: Fathom-HubSpot Lookup Diagnostic

on:
  push:
    branches: [main]
    paths:
      - 'triggers/diagnostic-run.txt'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test resolve-fathom-url for David Shapiro (contact 227288962849)
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          echo "=== Running resolve-fathom-url.mjs (expects share URL) ==="
          FATHOM_URL=$(node scripts/resolve-fathom-url.mjs 227288962849 2>&1)
          echo "URL output: $FATHOM_URL"
          echo ""

          echo "=== Running fetch-hubspot-fathom-notes.mjs (expects full transcript) ==="
          TRANSCRIPT=$(node scripts/fetch-hubspot-fathom-notes.mjs 227288962849 2>&1)
          echo "Transcript length: ${#TRANSCRIPT}"
          echo "First 500 chars:"
          echo "$TRANSCRIPT" | head -c 500
