name: Fathom-HubSpot Lookup Diagnostic

on:
  push:
    branches: [main]
    paths:
      - 'triggers/diagnostic-run.txt'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test resolve-fathom-url for David Shapiro (contact 227288962849)
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          echo "=== Running resolve-fathom-url.mjs ==="
          RESULT=$(node scripts/resolve-fathom-url.mjs 227288962849 2>&1)
          echo "$RESULT"
          echo ""

          echo "=== Meeting bodies (batch read IDs 110808831077 + 110848585243) ==="
          curl -s \
            -X POST \
            -H "Authorization: Bearer $HUBSPOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hubapi.com/crm/v3/objects/meetings/batch/read" \
            -d '{"properties":["hs_meeting_title","hs_meeting_body","hs_timestamp","hs_meeting_external_url"],"inputs":[{"id":"110808831077"},{"id":"110848585243"}]}' \
            | jq '[.results[] | {id: .id, title: .properties.hs_meeting_title, timestamp: .properties.hs_timestamp, body_snippet: (.properties.hs_meeting_body // "" | .[0:300]), external_url: .properties.hs_meeting_external_url}]'
