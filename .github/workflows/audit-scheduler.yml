name: Audit Scheduler (Proposal + Consultation Check)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      lookahead_days:
        description: "How many days ahead to look for proposal calls (default: 7)"
        required: false
        default: "7"
        type: string

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check HubSpot for proposal bookings and generate trigger files
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          LOOKAHEAD_DAYS: ${{ github.event.inputs.lookahead_days || '7' }}
        run: node scripts/check-proposal-bookings.mjs

      - name: Check HubSpot for consultation meetings and generate trigger files
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
        run: node scripts/check-consultation-meetings.mjs

      - name: Commit and push any new trigger files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add triggers/audit-research/ || true
          if ! git diff --cached --quiet; then
            git commit -m "Auto-trigger: proposal call bookings $(date -u +%Y-%m-%d)"
            git push origin main
            echo "Pushed new trigger files — audit pipeline will fire automatically."
          else
            echo "No new proposal bookings found. Nothing to trigger."
          fi
