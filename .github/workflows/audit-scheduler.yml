name: Audit Scheduler (Daily Proposal Call Check)

on:
  schedule:
    # 9 AM ET weekdays (14:00 UTC)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "How many hours back to check for new bookings (default: 48)"
        required: false
        default: "48"
        type: string

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check HubSpot for proposal bookings and generate trigger files
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '48' }}
        run: node scripts/check-proposal-bookings.mjs

      - name: Commit and push any new trigger files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add triggers/audit-research/ || true
          if ! git diff --cached --quiet; then
            git commit -m "Auto-trigger: proposal call bookings $(date -u +%Y-%m-%d)"
            git push origin main
            echo "Pushed new trigger files — audit pipeline will fire automatically."
          else
            echo "No new proposal bookings found. Nothing to trigger."
          fi
