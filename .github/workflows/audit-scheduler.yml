name: Audit Scheduler (Proposal + Consultation Check)

on:
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "How many days back to look for deals moved to Proposal Scheduled (default: 2)"
        required: false
        default: "2"
        type: string

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check HubSpot for deals moved to Proposal Scheduled and generate trigger files
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '2' }}
        run: node scripts/check-proposal-bookings.mjs

      - name: Check HubSpot for consultation meetings and generate trigger files
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          FATHOM_API_KEY: ${{ secrets.FATHOM_API_KEY }}
        run: node scripts/check-consultation-meetings.mjs

      - name: Commit and push any new trigger files (one commit per file)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add triggers/audit-research/ || true
          # Stage each new/changed trigger file as its own commit so the
          # audit-pipeline.yml (which uses `git diff-tree | head -1`) fires
          # a separate pipeline run for every firm rather than just the first.
          PUSHED=0
          for file in $(git diff --cached --name-only | grep 'triggers/audit-research/.*\.json'); do
            git reset HEAD -- . > /dev/null 2>&1 || true
            git add "$file"
            friendly=$(basename "$file" .json)
            git commit -m "Auto-trigger: $friendly $(date -u +%Y-%m-%d)"
            git push origin main
            echo "Pushed trigger: $file"
            PUSHED=$((PUSHED + 1))
          done
          if [ "$PUSHED" -eq 0 ]; then
            echo "No new proposal bookings found. Nothing to trigger."
          else
            echo "Pushed $PUSHED trigger file(s) — audit pipeline will fire for each."
          fi
